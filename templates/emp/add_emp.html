<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Add Employee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'emp/navbar.html' %}

<div class="container mt-4">
  <h2 class="text-center">Add Employee</h2>

  <div class="row">
    <div class="col-md-6 offset-md-3">
      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label>Name</label>
          <input type="text" name="emp_name" class="form-control">
        </div>

        <div class="mb-3">
          <label>ID</label>
          <input type="text" name="emp_id" class="form-control">
        </div>

        <div class="mb-3">
          <label>Phone</label>
          <input type="text" name="emp_phone" class="form-control">
        </div>

        <div class="mb-3">
          <label>Address</label>
          <textarea name="emp_address" class="form-control"></textarea>
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" name="emp_working" class="form-check-input">
          <label class="form-check-label">Working</label>
        </div>

        <div class="mb-3">
          <label>Department</label>
          <select name="emp_department" class="form-control">
            <option value="IT">IT</option>
            <option value="HR">HR</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Salary</label>
          <input type="number" name="emp_salary" class="form-control">
        </div>

        <div class="text-center">
          <button class="btn btn-success">Add</button>
        </div>

      </form>
    </div>
  </div>
</div>

</body>
</html>
