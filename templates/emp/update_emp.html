<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Update Employee Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>

    {% include 'emp/navbar.html' %}

    <h1 class="text-center my-3">Update Employee</h1>

    <div class="container">
      <div class="row">
        <div class="col-md-6 offset-md-3">

          <div class="card bg-light">
            <div class="card-body">

              <form action="/emp/do-update-emp/{{ emp.id }}" method="POST">
                {% csrf_token %}

                <!-- Name -->
                <div class="mb-3">
                  <label>Employee Name</label>
                  <input type="text" name="emp_name" class="form-control" value="{{ emp.name }}">
                </div>

                <!-- ID -->
                <div class="mb-3">
                  <label>Employee ID</label>
                  <input type="text" name="emp_id" class="form-control" value="{{ emp.emp_id }}">
                </div>

                <!-- Phone -->
                <div class="mb-3">
                  <label>Phone</label>
                  <input type="text" name="emp_phone" class="form-control" value="{{ emp.phone }}">
                </div>

                <!-- Address -->
                <div class="mb-3">
                  <label>Address</label>
                  <textarea name="emp_address" class="form-control">{{ emp.address }}</textarea>
                </div>

                <!-- Working -->
                <div class="mb-3 form-check">
                  <input type="checkbox" name="emp_working" class="form-check-input"
                  {% if emp.working %} checked {% endif %}>
                  <label class="form-check-label">Working</label>
                </div>

                <!-- Department -->
                <div class="mb-3">
                  <label>Department</label>
                  <select name="emp_department" class="form-control">

                    <option value="CSE" {% if emp.department == "CSE" %} selected {% endif %}>
                      Computer Science
                    </option>

                    <option value="ME" {% if emp.department == "ME" %} selected {% endif %}>
                      Mechanical Engineering
                    </option>

                    <option value="EE" {% if emp.department == "EE" %} selected {% endif %}>
                      Electrical Engineering
                    </option>

                    <option value="CE" {% if emp.department == "CE" %} selected {% endif %}>
                      Civil Engineering
                    </option>

                  </select>
                </div>

                <!-- Salary -->
                <div class="mb-3">
                  <label>Salary</label>
                  <input type="number" name="emp_salary" class="form-control" value="{{ emp.salary }}" min="0">
                </div>

                <!-- Button -->
                <div class="text-center">
                  <button class="btn btn-success">Update Employee</button>
                </div>

              </form>

            </div>
          </div>

        </div>
      </div>
    </div>

  </body>
</html>
