<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Update Employee Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  </head>
  <body>
    {% include 'emp/navbar.html' %}
    <h1 class="text-center my-3">Update Employee</h1>

    <div class="container">
      <div class="row">
        <div class="col-md-6 offset-md-3">
          <div class="card bg-light text-black">
            <div class="card-body">
              <form action="/emp/do-update-emp/{{emp.id}}" method="POST">
                {% csrf_token %}

                <!--Employee Name-->
                <div class="mb-3">
                  <label for="name">Employee name</label>
                  <input
                    id="name"
                    type="text"
                    class="form-control"
                    placeholder="Enter emp name"
                    name="emp_name"
                    value="{{emp.name}}"
                  />
                </div>

                <!--Employee ID-->
                <div class="mb-3">
                  <label for="id">Employee id</label>
                  <input
                    id="id"
                    type="text"
                    class="form-control"
                    placeholder="Enter emp id"
                    name="emp_id"
                    value="{{emp.emp_id}}"
                  />
                </div>

                <!--Phone Number-->
                <div class="mb-3">
                  <label for="phone">Phone</label>
                  <input
                    id="phone"
                    type="text"
                    class="form-control"
                    placeholder="Enter emp phone"
                    name="emp_phone"
                    value="{{emp.phone}}"
                  />
                </div>

                <!--Employee Address-->
                <div class="mb-3">
                  <label for="address">Employee Address</label>
                  <textarea
                    name="emp_address"
                    id="address"
                    rows="5"
                    class="form-control"
                  >{{emp.address}}</textarea>
                </div>

                <!--Working Status-->
                <div class="mb-3 form-check">
                  <label for="working">Working</label>
                  <input {% if emp.working %} checked {% endif %} id="working" name="emp_working" type="checkbox" class="form-check-input">
                </div>

                <!--Departments-->
                <div class="mb-3">
                  <label for="department">Departments</label>
                  <select name="emp_department" id="department" class="form-control">
                      <option value="CSE" {% if emp.department=="CSE" %}selected{% endif %}>Computer Science</option>
                      <option value="ME" {% if emp.department=="ME" %}selected{% endif %}>Mechanical Engineering</option>
                      <option value="EE" {% if emp.department=="EE" %}selected{% endif %}>Electrical Engineering</option>
                      <option value="CE" {% if emp.department=="CE" %}selected{% endif %}>Civil Engineering</option>
                  </select>
                </div>

                <!--Salary-->
                <div class="mb-3">
                  <label for="salary">Salary</label>
                  <input
                    id="salary"
                    type="number"
                    class="form-control"
                    placeholder="Enter Salary"
                    name="emp_salary"
                    value="{{emp.salary}}"
                    min="0"
                  />
                </div>

                <!--Update Button-->
                <div class="container text-center">
                    <button class="btn btn-success">
                        Update Employee
                    </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
